services:
  db:
    image: postgres:16-alpine
    container_name: renpia-db
    environment:
      POSTGRES_DB: renpia_db
      POSTGRES_USER: renpia
      POSTGRES_PASSWORD: renpia_local
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
